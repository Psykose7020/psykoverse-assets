<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Logo Psykoverse animé</title>
  <desc id="desc">Hexagone bleu avec planète annelée cyan, animé par de petites rotations.</desc>
  <style>
    :root {
      color-scheme: light;
    }

    #hexagon {
      animation: hex-rotate 14s ease-in-out infinite;
      transform-origin: 256px 256px;
    }

    #planet {
      animation: planet-breathe 6s ease-in-out infinite;
      transform-origin: 256px 256px;
    }

    #ring {
      animation: ring-tilt 4.8s ease-in-out infinite;
      transform-origin: 256px 256px;
    }

    #front-shine {
      animation: shine-pulse 3.6s ease-in-out infinite;
    }

    @keyframes hex-rotate {
      0%, 100% { transform: rotate(-1.4deg); }
      50% { transform: rotate(1.4deg); }
    }

    @keyframes planet-breathe {
      0%, 100% { transform: rotate(-1deg) scale(1); }
      50% { transform: rotate(1deg) scale(1.025); }
    }

    @keyframes ring-tilt {
      0%, 100% { transform: rotate(-3deg); }
      50% { transform: rotate(3deg); }
    }

    @keyframes shine-pulse {
      0%, 100% { opacity: .62; }
      50% { opacity: 1; }
    }

    @media (prefers-reduced-motion: reduce) {
      #hexagon,
      #planet,
      #ring,
      #front-shine {
        animation: none;
      }
    }
  </style>
  <defs>
    <linearGradient id="hexStroke" x1="122" y1="42" x2="390" y2="470" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#18c9ff"/>
      <stop offset=".48" stop-color="#0aaef0"/>
      <stop offset="1" stop-color="#0870d2"/>
    </linearGradient>

    <linearGradient id="planetStroke" x1="188" y1="139" x2="319" y2="373" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f8ffff"/>
      <stop offset=".34" stop-color="#cfffff"/>
      <stop offset=".68" stop-color="#47d9ed"/>
      <stop offset="1" stop-color="#005a92"/>
    </linearGradient>

    <linearGradient id="ringStroke" x1="88" y1="337" x2="430" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#faffff"/>
      <stop offset=".2" stop-color="#bdfcff"/>
      <stop offset=".45" stop-color="#e9ffff"/>
      <stop offset=".72" stop-color="#74e9f5"/>
      <stop offset="1" stop-color="#0085ba"/>
    </linearGradient>

    <filter id="cyanGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.04  0 0 0 0 0.75  0 0 0 0 1  0 0 0 .65 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#009ee8" flood-opacity=".22"/>
    </filter>
  </defs>

  <rect width="512" height="512" fill="#ffffff"/>

  <g id="hexagon" fill="none" stroke-linejoin="round" filter="url(#softShadow)">
    <path
      d="M256 22 451 137v238L256 490 61 375V137L256 22Z"
      stroke="#dff7ff"
      stroke-width="10"
      opacity=".55"
    />
    <path
      d="M256 24 449 138v236L256 488 63 374V138L256 24Z"
      stroke="url(#hexStroke)"
      stroke-width="6"
    />
  </g>

  <g id="planet" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#cyanGlow)">
    <path
      d="M192 333C159 295 152 239 177 194C204 146 260 126 309 150C350 170 373 213 366 258"
      stroke="#eaffff"
      stroke-width="19"
      opacity=".55"
    />
    <path
      d="M193 333C161 296 154 241 179 196C205 150 258 132 304 153C344 172 367 214 360 257"
      stroke="url(#planetStroke)"
      stroke-width="13"
    />
    <path
      d="M211 363C247 382 293 377 325 347C348 325 359 294 356 263"
      stroke="#005684"
      stroke-width="13"
      opacity=".95"
    />
  </g>

  <g id="ring" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#cyanGlow)">
    <path
      d="M94 318C129 278 196 233 270 202C345 171 411 162 424 184C438 207 394 256 322 298C250 340 161 367 112 354C91 348 85 337 94 318Z"
      stroke="#efffff"
      stroke-width="21"
      opacity=".62"
    />
    <path
      d="M96 318C131 280 197 235 271 204C344 173 408 164 421 185C435 207 392 254 321 296C249 338 164 364 114 352C93 347 87 336 96 318Z"
      stroke="url(#ringStroke)"
      stroke-width="14"
    />
    <path
      id="front-shine"
      d="M151 341C195 331 257 306 319 270C372 239 410 205 421 185"
      stroke="#faffff"
      stroke-width="7"
      opacity=".7"
    />
  </g>
</svg>
